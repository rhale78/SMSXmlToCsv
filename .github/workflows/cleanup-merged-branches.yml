name: Cleanup Merged Branches

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  delete-merged-branch:
    name: Delete branch after PR merge
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const protectedBranches = ['main', 'master'];
            if (protectedBranches.includes(branch)) {
              console.log(`Skipping protected branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              console.log(`Failed to delete branch ${branch}: ${error.message}`);
            }

  cleanup-stale-branches:
    name: Delete stale branches merged into default
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Find and delete branches fully merged into default
        uses: actions/github-script@v7
        with:
          script: |
            const protectedBranches = ['main', 'master'];
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const defaultBranch = repo.default_branch;
            console.log(`Default branch: ${defaultBranch}`);

            let page = 1;
            let allBranches = [];
            while (true) {
              const { data: branches } = await github.rest.repos.listBranches({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page
              });
              allBranches = allBranches.concat(branches);
              if (branches.length < 100) break;
              page++;
            }

            for (const branch of allBranches) {
              if (protectedBranches.includes(branch.name) || branch.name === defaultBranch) {
                console.log(`Skipping protected branch: ${branch.name}`);
                continue;
              }

              // Only delete branches whose commits are fully included in the default branch
              let aheadBy = null;
              try {
                const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${defaultBranch}...${branch.name}`
                });
                aheadBy = comparison.ahead_by;
              } catch (error) {
                console.log(`Could not compare ${branch.name} with ${defaultBranch}: ${error.message}`);
                continue;
              }

              if (aheadBy === null || aheadBy > 0) {
                console.log(`Skipping branch with unmerged commits: ${branch.name} (${aheadBy ?? 'unknown'} commit(s) ahead of ${defaultBranch})`);
                continue;
              }

              // Confirm there is a merged PR for this branch before deleting
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch.name}`,
                state: 'closed',
                per_page: 1
              });

              const mergedPr = prs.find(pr => pr.merged_at !== null);
              if (mergedPr) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch.name}`
                  });
                  console.log(`Deleted branch: ${branch.name} (PR #${mergedPr.number} merged at ${mergedPr.merged_at})`);
                } catch (error) {
                  console.log(`Failed to delete branch ${branch.name}: ${error.message}`);
                }
              } else {
                console.log(`Skipping branch with no merged PRs: ${branch.name}`);
              }
            }
